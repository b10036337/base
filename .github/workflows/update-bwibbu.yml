name: Update TWSE BWIBBU data

on:
  schedule:
    # Run every day at 18:00 UTC, after Taiwan market data is typically available.
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-bwibbu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest BWIBBU data
        run: python fetch_bwibbu.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update TWSE BWIBBU data"
          file_pattern: bwibbu_all.csv
